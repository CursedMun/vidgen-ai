services:
  vidgen_ai_db:
    image: postgres:17.8
    container_name: vidgen_ai_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vidgen_ai
    ports:
      - "5433:5432"
    volumes:
      - vidgen_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vidgen_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vidgen_ai_postgres_data:
